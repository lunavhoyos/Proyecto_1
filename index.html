<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 400px;
            margin-top: 20px;
            justify-content: center;
            background-color: rgb(216, 126, 255);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: center;
            margin-left: 400px;
            margin-right: 400px;
        }
        label {
            display: block;
            margin-top: 10px;
            text-align: center;
            align-items: center;
            justify-content: center;
            position: center;
            margin-left: 300px;
            margin-right: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px 15px;
        }
        #mensaje {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Hola Mundo</h1>
    <h2>Segundo despliegue</h2>

    <div>
        <h1>Registro de Usuarios</h1>
        <form id="registro">
            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre"><br>

            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido"><br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email"><br>

            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password"><br>

            <button type="submit">Guardar</button>
            <p id="mensaje"></p>
        </form>
    </div>

    <script>
        const { createClient } = supabase

        const SUPABASE_URL = 'https://zqbitryqyhyafutzcloz.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_Wiju0bv0JHjrg9_YGdXbiw_V4NyEoDT'

        const db = createClient(SUPABASE_URL, SUPABASE_KEY)

        document.getElementById('registro').addEventListener('submit', async (e) => {
            e.preventDefault()

            const nombre   = document.getElementById('nombre').value.trim()
            const apellido = document.getElementById('apellido').value.trim()
            const email    = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value.trim()

            const { data, error } = await db
                .from('usuarios')
                .insert({ nombre, apellido, email, password })

            if (error) {
                console.error(error)
                document.getElementById('mensaje').textContent = '❌ Error al guardar'
            } else {
                document.getElementById('mensaje').textContent = '✅ Usuario guardado!'
                document.getElementById('registro').reset()
            }
        })
    </script>

</body>
</html>
