<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #4c1d95;
    }

    /* Contenedor del formulario */
    .form-container {
        background-color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 25px rgba(124, 58, 237, 0.1);
        width: 100%;
        max-width: 400px;
        margin: 20px;
    }

    h1 {
        text-align: center;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 30px;
        color: #5b21b6;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    label {
        font-size: 14px;
        font-weight: 500;
        color: #6d28d9;
    }

    input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #ddd6fe;
        border-radius: 12px;
        font-size: 14px;
        color: #4c1d95;
        background-color: #fcfaff;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    button {
        margin-top: 10px;
        background-color: #8b5cf6;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.1s ease;
    }

    button:hover {
        background-color: #7c3aed;
    }

    button:active {
        transform: scale(0.98);
    }

    p#mensaje {
        text-align: center;
        margin-top: 5px;
        font-size: 14px;
        font-weight: 500;
        min-height: 20px;
    }
</style>
<body>
    <div class="form-container">
        <h1>Registro de Usuarios</h1>

        <form id="registro">
            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="input-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password">
            </div>

            <button type="submit">Guardar</button>
            <p id="mensaje"></p>
        </form>
    </div>

    <script>
        const { createClient } = supabase

        const SUPABASE_URL = 'https://zqbitryqyhyafutzcloz.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_Wiju0bv0JHjrg9_YGdXbiw_V4NyEoDT'

        const db = createClient(SUPABASE_URL, SUPABASE_KEY)

        document.getElementById('registro').addEventListener('submit', async (e) => {
            e.preventDefault()

            const nombre   = document.getElementById('nombre').value.trim()
            const apellido = document.getElementById('apellido').value.trim()
            const email    = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value.trim()

            if (!nombre || !apellido || !email || !password) {
                document.getElementById('mensaje').textContent = '⚠️ Todos los campos son obligatorios'
                return
            }

            document.getElementById('mensaje').textContent = '⏳ Guardando...'

            const { data, error } = await db
                .from('usuarios')
                .insert([{ nombre, apellido, email, password }])
                .select()

            if (error) {
                console.error('Código:', error.code)
                console.error('Mensaje:', error.message)

                if (error.code === '23505') {
                    document.getElementById('mensaje').textContent = '❌ Ese email ya está registrado'
                } else if (error.code === '42501') {
                    document.getElementById('mensaje').textContent = '❌ Sin permisos (revisa RLS en Supabase)'
                } else {
                    document.getElementById('mensaje').textContent = `❌ Error: ${error.message}`
                }
            } else {
                document.getElementById('mensaje').textContent = '✅ Usuario guardado!'
                document.getElementById('registro').reset()
            }
        })
    </script>

</body>
</html>
