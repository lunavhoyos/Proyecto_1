<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
</head>
<body>
    <h1 style="color: rgb(153, 0, 255);">Hola Mundo</h1>
    <h2 style="color: blueviolet;">Segundo despliegue</h2>



        <div style="background-color: rgb(230, 171, 255); width: 300px; height: 300px; display: flex; justify-content: center; align-items: center;">
            <h1>REgistro de Usuarios</h1>
            <form action="registro">
                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre">
                <br>
                <label for="apellido">Apellido</label>
                <input type="text" name="apellido" id="apellido">
                <br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <br>
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password">
                <br>
                <button type="submit">Guardar</button>
            </form>
        </div>

  <script>
    const { createClient } = supabase

    const NEXT_PUBLIC_SUPABASE_URL= 'https://zqbitryqyhyafutzcloz.supabase.co'
    const NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY= 'sb_publishable_Wiju0bv0JHjrg9_YGdXbiw_V4NyEoDT'

    const supabase = createClient(NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY)

    document.getElementById('registro').addEventListener('submit', async (e) => {
      e.preventDefault()  // evita que la página se recargue

      const nombre   = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const { data, error } = await supabase
        .from('usuarios')
        .insert({ nombre, apellido, email, password })

      if (error) {
        console.error(error)
        document.getElementById('mensaje').textContent = '❌ Error al guardar'
      } else {
        document.getElementById('mensaje').textContent = '✅ Usuario guardado!'
        document.getElementById('registro').reset()  // limpia el form
      }
    })
  </script>

</body>
</html>
