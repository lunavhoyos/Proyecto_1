<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1 style="color: rgb(153, 0, 255);">Hola Mundo</h1>
    <h2 style="color: blueviolet;">Segundo despliegue</h2>

    <div style="background-color: rgb(230, 171, 255); width: 300px; height: auto; padding: 20px;">
        <h1>Registro de Usuarios</h1>

        <form id="registro">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre"><br>

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido"><br>

            <label for="email">Email</label>
            <input type="email" id="email"><br>

            <label for="password">Contraseña</label>
            <input type="password" id="password"><br>

            <button type="submit">Guardar</button>
            <p id="mensaje"></p>
        </form>
    </div>

    <script>
        const { createClient } = supabase

        const SUPABASE_URL = 'https://zqbitryqyhyafutzcloz.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_Wiju0bv0JHjrg9_YGdXbiw_V4NyEoDT'

        const db = createClient(SUPABASE_URL, SUPABASE_KEY)

        document.getElementById('registro').addEventListener('submit', async (e) => {
            e.preventDefault()

            const nombre   = document.getElementById('nombre').value.trim()
            const apellido = document.getElementById('apellido').value.trim()
            const email    = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value.trim()

            if (!nombre || !apellido || !email || !password) {
                document.getElementById('mensaje').textContent = '⚠️ Todos los campos son obligatorios'
                return
            }

            document.getElementById('mensaje').textContent = '⏳ Guardando...'

            const { data, error } = await db
                .from('usuarios')
                .insert([{ nombre, apellido, email, password }])
                .select()

            if (error) {
                console.error('Código:', error.code)
                console.error('Mensaje:', error.message)

                if (error.code === '23505') {
                    document.getElementById('mensaje').textContent = '❌ Ese email ya está registrado'
                } else if (error.code === '42501') {
                    document.getElementById('mensaje').textContent = '❌ Sin permisos (revisa RLS en Supabase)'
                } else {
                    document.getElementById('mensaje').textContent = `❌ Error: ${error.message}`
                }
            } else {
                document.getElementById('mensaje').textContent = '✅ Usuario guardado!'
                document.getElementById('registro').reset()
            }
        })
    </script>

</body>
</html>
